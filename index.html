<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical 8: Pattern Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Pattern Generator</h2>
    
    <label>Pattern Type</label>
    <select id="patternType">
        <option value="full">Full Pyramid</option>
        <option value="inverted">Inverted Half Pyramid</option>
    </select>

    <label>Symbol</label>
    <input type="text" id="symbol" maxlength="1" value="*">

    <label>Number of Rows</label>
    <input type="number" id="rows" value="5" min="1">

    <button onclick="generatePattern()">Generate Pattern</button>

    <br>
    <div id="output">Output will appear here</div>
</div>

<script src="script.js"></script>

</body>
</html>
